    ipAddress: "192.168.20.101"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/eb4b0d195fe81e8bd3d33a312c45976fcd2efba262d3663fbd0d2cfead692e5d
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:f9:0f:52"
        dhcp: false
        addresses:
          - "192.168.20.101/24"
        routes:
          - gateway: "192.168.20.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "192.168.20.100"
